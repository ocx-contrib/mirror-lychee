name: lychee
target:
  registry: ocx.sh
  repository: lychee

source:
  type: github_release
  owner: lycheeverse
  repo: lychee
  tag_pattern: "^lychee-v(?P<version>\\d+\\.\\d+\\.\\d+)$"

# Platform notes (verified against v0.24.2 release assets):
# - No linux musl: gnu-libc builds only
# - No windows/arm64: upstream does not ship one
# - Assets ship as archives wrapped in `lychee-<triple>/` (since 0.24);
#   stripped via strip_components: 1.
assets:
  linux/amd64:
    - "lychee-x86_64-unknown-linux-gnu\\.tar\\.gz$"
  linux/arm64:
    - "lychee-aarch64-unknown-linux-gnu\\.tar\\.gz$"
  darwin/amd64:
    - "lychee-x86_64-apple-darwin\\.tar\\.gz$"
  darwin/arm64:
    - "lychee-aarch64-apple-darwin\\.tar\\.gz$"
  windows/amd64:
    - "lychee-x86_64-pc-windows-msvc\\.zip$"

asset_type:
  type: archive
  strip_components: 1

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
build_timestamp: none

versions:
  min: "0.24.1"
  new_per_run: 10

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0
